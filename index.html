<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento Pessoal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Fonte -->
    <script defer src="https://use.fontawesome.com/releases/v5.0.8/js/all.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5">
       
        <div class="container">
            <a href="#" class="navbar-brand d-flex aligh-items-center" >
                <img src="logo.png" alt="Orçamento Pessoal" width="50" class="me-2">
                Orçamento Pessoal
            </a>
            <button class="navbar-toggler" type="button" 
                data-bs-toggle="collapse" 
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
        
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item active">
                    <a href="index.html" class="nav-link">Cadastro</a>
                </li>
                <li class="nav-item active">
                    <a href="consulta.html" class="nav-link">Consulta</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">

        <div class="row">
            <div class="col mb-5">
                <h1 class="display-4">Registro de nova despesa</h1>
            </div>
        </div>

        <div class="row mb-2">
            <div class="col-md-2">
                <select id="ano" class="form-control">
                    <option value=""> - Ano - </option>
                    <option value="2026">2026</option>
                </select>
            </div>

            <div class="col-md-2">
                <select id="mes" class="form-control">
                    <option> - Mês -</option>
                    <option value="1">Janeiro</option>
                    <option value="2">Fevereiro</option>
                    <option value="3">Março</option>
                    <option value="4">Abril</option>
                    <option value="5">Maio</option>
                    <option value="6">Junho</option>
                    <option value="7">Julho</option>
                    <option value="8">Agosto</option>
                    <option value="9">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
            </div>

            <div class="col-md-2">
                <input id="dia" type="text" class="form-control" placeholder="Dia">
            </div>

            <div class="col-md-6">
                <select id="tipo" class="form-control">
                    <option> - Tipo - </option>
                    <option value="1">Alimentação</option>
                    <option value="2">Educação</option>
                    <option value="3">Lazer</option>
                    <option value="4">Saúde</option>
                    <option value="5">Transporte</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <input id="descricao" type="text" class="form-control" placeholder="Descrição">
            </div>

            <div class="col-md-2">
                <input id="valor" type="text" class="form-control" placeholder="Valor">
            </div>

            <div class="col-md-2 d-flex justify-content-end">
                <button type="button" class="btn btn-primary">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>

    </div>
</body>
</html>
